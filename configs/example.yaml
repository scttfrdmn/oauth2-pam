# oauth2-pam broker configuration
# Copy to /etc/oauth2-pam/broker.yaml and edit for your environment.

server:
  socket_path: /var/run/oauth2-pam/broker.sock
  log_level: info                          # debug | info | warn | error
  audit_log: /var/log/oauth2-pam/audit.log
  read_timeout: 30s
  write_timeout: 30s

# ---------------------------------------------------------------------------
# OAuth2 Providers
# ---------------------------------------------------------------------------
# Only GitHub is supported today. Additional providers can be added in future.

providers:
  - name: github
    type: github
    client_id: "Iv1.xxxxxxxxxxxx"          # GitHub OAuth App client ID
    client_secret: "your-client-secret"    # GitHub OAuth App client secret

    github:
      # Require membership in this GitHub org (leave empty to allow any GitHub user)
      require_org: my-org

      # Require membership in at least one of these teams (optional)
      # Format: "org-name/team-slug"
      # require_teams:
      #   - my-org/engineers
      #   - my-org/ops

      # Explicit user allowlist — bypasses org/team checks (optional)
      # allow_users:
      #   - octocat

# ---------------------------------------------------------------------------
# Identity Mapper
# ---------------------------------------------------------------------------
# Four tiers are tried in order; the first match wins.
# At least one tier must be configured.
#
# Tier 0 — enrollment_file: self-enrolled users (set up with oauth2-pam-enroll)
# Tier 1 — rules: built-in YAML rules, zero runtime dependencies
# Tier 2 — external_script: external binary (JSON stdin → JSON stdout)
# Tier 3 — http_endpoint: HTTP identity service (POST JSON)

mapper:

  # --- Tier 0: enrollment file (optional) ---
  # Users self-enroll once with: sudo oauth2-pam-enroll --user <local-user>
  # The enrollment file maps local Unix usernames to their GitHub logins.
  # On auth, the broker checks whether the PAM-supplied username matches an
  # enrolled GitHub identity before falling through to the other tiers.
  #
  enrollment_enabled: false
  enrollment_file: /etc/oauth2-pam/enrolled-users.yaml

  # --- Tier 1: built-in rules ---
  # All match fields within a rule are ANDed; first matching rule wins.
  # local_user supports {{ .Login }} template (expands to GitHub login).

  rules:
    # Org admins get sudo
    - match:
        github_org: my-org
        github_team: my-org/admins
      local_user: "{{ .Login }}"
      groups: [users, sudo]

    # All org members get a normal account
    - match:
        github_org: my-org
      local_user: "{{ .Login }}"
      groups: [users]

    # Direct user mapping (overrides any org check)
    # - match:
    #     github_login: octocat
    #   local_user: octocat
    #   groups: [users]

  # --- Tier 2: external script (optional) ---
  # The script receives an Identity JSON object on stdin and must write
  # a {"local_user": "...", "groups": [...]} JSON object to stdout.
  # Exit non-zero or emit empty/missing local_user to skip to next tier.
  #
  # external_script: /usr/local/lib/oauth2-pam/map-user.sh
  # external_script_timeout: 5s

  # --- Tier 3: HTTP service (optional) ---
  # POST body: {"provider":"github","login":"...","orgs":[...],"teams":[...]}
  # Expected response: {"local_user":"...","groups":[...]}
  # Return 404 or 204 to indicate no mapping (falls through to next tier).
  #
  # http_endpoint: http://localhost:8082/map
  # http_timeout: 2s

# ---------------------------------------------------------------------------
# Authentication
# ---------------------------------------------------------------------------

authentication:
  token_lifetime: 8h
  refresh_threshold: 1h
  max_concurrent_sessions: 10

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------

security:
  secure_token_storage: true
  # token_encryption_key must be exactly 16, 24, or 32 characters
  # Generate with: openssl rand -hex 16
  # token_encryption_key: "change-me-32-byte-key-here!!!!!"
  max_token_age: 24h
  rate_limiting:
    max_requests_per_minute: 60
    max_concurrent_auths: 10

# ---------------------------------------------------------------------------
# Audit logging
# ---------------------------------------------------------------------------

audit:
  enabled: true
  format: json

  outputs:
    - type: file
      path: /var/log/oauth2-pam/audit.log

    # Uncomment to also log to stdout (useful for journald / Docker)
    # - type: stdout

    # Uncomment to log to syslog
    # - type: syslog
    #   facility: auth
    #   severity: info

  events:
    - authentication_attempt
    - authentication_success
    - authentication_failure
    - session_revoked
